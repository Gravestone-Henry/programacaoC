<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela gestão financeira</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --primary: #4e73df;
            --secondary: #858796;
            --success: #1cc88a;
            --danger: #e74a3b;
            --text-main: #2e3748;
            --border: #e3e6f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main);
            padding: 40px 20px;
        }

        .container { 
            max-width: 1200px; 
            margin: auto; 
        }

        /* Header Style */
        .header {
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .salary-input-container {
            background: white;
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .salary-input-container label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--secondary);
        }

        .salary-input-container input {
            border: none;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary);
            width: 120px;
            outline: none;
        }

        .header h1 { font-size: 1.5rem; font-weight: 600; color: #4e73df; }
        
        /* Dashboard Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 69, 0.1);
            padding: 20px;
            border: 1px solid var(--border);
        }

        .card-title {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Table Styling */
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        th { text-align: left; padding: 12px; color: var(--secondary); font-size: 0.75rem; text-transform: uppercase; }
        td { background: #fff; padding: 12px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
        td:first-child { border-left: 1px solid var(--border); border-radius: 8px 0 0 8px; font-weight: 600; }
        td:last-child { border-right: 1px solid var(--border); border-radius: 0 8px 8px 0; }

        input[type="number"] {
            width: 90px;
            padding: 8px;
            border: 1px solid #d1d3e2;
            border-radius: 5px;
            font-size: 0.85rem;
        }

        .total-val { font-weight: 700; color: var(--success); text-align: right; }
        .chart-container { height: 300px; position: relative; }

        /* Stats Cards */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            padding: 15px;
            border-left: 4px solid var(--primary);
        }

        .stat-label { font-size: 0.7rem; color: var(--secondary); text-transform: uppercase; font-weight: bold; }
        .stat-value { font-size: 1.2rem; font-weight: 700; margin-top: 5px; }

        @media (min-width: 992px) {
            .dashboard-grid { grid-template-columns: 2fr 1fr; }
            .table-card { grid-column: 1 / -1; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1>Gestão financeira</h1>
            <p>Controle de gastos domésticos mensais</p>
        </div>
        
        <div class="salary-input-container">
            <label>MEU SALÁRIO: R$</label>
            <input type="number" id="salario-input" placeholder="0,00" oninput="updateAll()">
        </div>

        <div id="total-ano-badge" style="background: var(--primary); color: white; padding: 10px 20px; border-radius: 30px; font-weight: bold;">
            Total Anual: R$ 0,00
        </div>
    </div>

    <div class="stats-row">
        <div class="card stat-card" style="border-left-color: var(--primary);">
            <div class="stat-label">Média de Gastos Mensal</div>
            <div class="stat-value" id="media-gastos">R$ 0,00</div>
        </div>
        <div class="card stat-card" style="border-left-color: var(--success);">
            <div class="stat-label">Sobras (Média)</div>
            <div class="stat-value" id="sobra-media">R$ 0,00</div>
        </div>
        <div class="card stat-card" id="status-cor" style="border-left-color: var(--secondary);">
            <div class="stat-label">% Comprometida</div>
            <div class="stat-value" id="percentual-renda">0%</div>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="card">
            <div class="card-title">Análise de Gastos Mensais</div>
            <div class="chart-container">
                <canvas id="mainChart"></canvas>
            </div>
        </div>

        <div class="card">
            <div class="card-title">Distribuição por Categoria</div>
            <div class="chart-container">
                <canvas id="pieChart"></canvas>
            </div>
        </div>

        <div class="card table-card">
            <div class="card-title">Lançamentos por Mês</div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Mês</th>
                            <th>Luz</th>
                            <th>Água</th>
                            <th>Internet</th>
                            <th>Compras</th>
                            <th>Lazer</th>
                            <th style="text-align: right;">Total</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
const meses = ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"];
    const categorias = ["luz", "agua", "internet", "compras", "lazer"];
    const cores = ['#4e73df', '#1cc88a', '#36b9cc', '#f6c23e', '#e74a3b'];
    
    // Tenta carregar dados existentes ou inicia um array vazio
    let dados = JSON.parse(localStorage.getItem('financas_dados')) || 
                meses.map(() => ({ luz: 0, agua: 0, internet: 0, compras: 0, lazer: 0, total: 0 }));
    
    let barChart, pieChart;

    function init() {
        const tbody = document.getElementById('table-body');
        const salarioSalvo = localStorage.getItem('financas_salario');
        
        if (salarioSalvo) {
            document.getElementById('salario-input').value = salarioSalvo;
        }

        meses.forEach((mes, i) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${mes}</td>
                ${categorias.map(cat => `
                    <td><input type="number" value="${dados[i][cat] || ''}" placeholder="0" oninput="update(${i}, '${cat}', this.value)"></td>
                `).join('')}
                <td class="total-val" id="total-${i}">R$ ${(dados[i].total || 0).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
            `;
            tbody.appendChild(tr);
        });

        renderCharts();
        updateAll(); // Atualiza os badges e gráficos com os dados carregados
    }

    function update(mesIdx, cat, val) {
        dados[mesIdx][cat] = parseFloat(val) || 0;
        dados[mesIdx].total = categorias.reduce((sum, c) => sum + dados[mesIdx][c], 0);
        document.getElementById(`total-${mesIdx}`).innerText = `R$ ${dados[mesIdx].total.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
        updateAll();
    }

    function updateAll() {
        const salario = document.getElementById('salario-input').value;
        
        // Salva no LocalStorage
        localStorage.setItem('financas_dados', JSON.stringify(dados));
        localStorage.setItem('financas_salario', salario);

        updateCharts();
        updateAnualBadge();
        calcularResumo();
    }

    function calcularResumo() {
        const salario = parseFloat(document.getElementById('salario-input').value) || 0;
        const mesesComDados = dados.filter(d => d.total > 0).length || 1;
        const totalAnual = dados.reduce((acc, mes) => acc + mes.total, 0);
        const mediaMensal = totalAnual / (mesesComDados || 1);
        
        document.getElementById('media-gastos').innerText = `R$ ${mediaMensal.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
        
        const sobraMedia = document.getElementById('sobra-media');
        const percRenda = document.getElementById('percentual-renda');
        const statusCor = document.getElementById('status-cor');

        if (salario > 0) {
            const sobra = salario - mediaMensal;
            const perc = (mediaMensal / salario) * 100;
            
            sobraMedia.innerText = `R$ ${sobra.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            percRenda.innerText = `${perc.toFixed(1)}%`;
            
            if (perc > 90) statusCor.style.borderLeftColor = 'var(--danger)';
            else if (perc > 70) statusCor.style.borderLeftColor = '#f6c23e';
            else statusCor.style.borderLeftColor = 'var(--success)';
        } else {
            sobraMedia.innerText = "R$ 0,00";
            percRenda.innerText = "0%";
            statusCor.style.borderLeftColor = 'var(--secondary)';
        }
    }

    function renderCharts() {
        const ctxBar = document.getElementById('mainChart').getContext('2d');
        barChart = new Chart(ctxBar, {
            type: 'bar',
            data: {
                labels: meses,
                datasets: [{
                    label: 'Gasto Mensal',
                    data: dados.map(d => d.total),
                    backgroundColor: '#4e73df',
                    borderRadius: 5
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });

        const ctxPie = document.getElementById('pieChart').getContext('2d');
        pieChart = new Chart(ctxPie, {
            type: 'doughnut',
            data: {
                labels: ['Luz', 'Água', 'Internet', 'Compras', 'Lazer'],
                datasets: [{
                    data: categorias.map(cat => dados.reduce((acc, mes) => acc + mes[cat], 0)),
                    backgroundColor: cores,
                    hoverOffset: 4
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
        });
    }

    function updateCharts() {
        barChart.data.datasets[0].data = dados.map(d => d.total);
        barChart.update();

        const totaisCat = categorias.map(cat => {
            return dados.reduce((acc, mes) => acc + mes[cat], 0);
        });
        pieChart.data.datasets[0].data = totaisCat;
        pieChart.update();
    }

    function updateAnualBadge() {
        const totalAnual = dados.reduce((acc, mes) => acc + mes.total, 0);
        document.getElementById('total-ano-badge').innerText = `Total Anual: R$ ${totalAnual.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
    }

    init();
</script>
</body>
</html>
